name: Kanban Build Engine
on:
  # schedule:
  #   - cron: '*/15 * * * *'  # Disabled until Claude Code GitHub App is installed
  workflow_dispatch:
env:
  PROJECT_ID: PVT_kwHOBA7RLM4BVBrQ
  STATUS_FIELD_ID: PVTSSF_lAHOBA7RLM4BVBrQzhQgUBE
  BACKLOG_ID: 0040b126
  PLANNING_ID: cb99ca9e
  NEXT_ID: 435710d3
  DOING_ID: 4c8c3cbc
  VERIFICATION_ID: 532c39be
  DONE_ID: 9755bcb5
  MAX_CONCURRENT_BUILDS: 3
jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity
        run: |
          git config user.name "Build Queue"
          git config user.email "build-queue@noreply.github.com"
      - name: Read board
        id: board
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ITEMS=$(gh api graphql -f query='{ node(id: "PVT_kwHOBA7RLM4BVBrQ") { ... on ProjectV2 { items(first: 100) { nodes { id content { ... on Issue { number title body labels(first: 10) { nodes { name } } } } fieldValues(first: 10) { nodes { ... on ProjectV2ItemFieldSingleSelectValue { field { ... on ProjectV2SingleSelectField { name } } name } } } } } } } }')
          echo "$ITEMS" > /tmp/board.json
          echo "planning=$(echo $ITEMS | jq '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Planning"))] | length')" >> $GITHUB_OUTPUT
          echo "next=$(echo $ITEMS | jq '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Next"))] | length')" >> $GITHUB_OUTPUT
          echo "doing=$(echo $ITEMS | jq '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Doing"))] | length')" >> $GITHUB_OUTPUT
      - name: Process Planning
        if: steps.board.outputs.planning > 0
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          cat /tmp/board.json | jq -c '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Planning"))] | .[]' | while read -r item; do
            ITEM_ID=$(echo $item | jq -r '.id')
            ISSUE_NUM=$(echo $item | jq -r '.content.number')
            gh issue comment $ISSUE_NUM --repo mishanovini/claudecode-writer --body '## Moving to Next. _Automated_'
            gh api graphql -f query='mutation { updateProjectV2ItemFieldValue(input: { projectId: "PVT_kwHOBA7RLM4BVBrQ" itemId: "'$ITEM_ID'" fieldId: "PVTSSF_lAHOBA7RLM4BVBrQzhQgUBE" value: { singleSelectOptionId: "435710d3" } }) { projectV2Item { id } } }'
          done
      - name: Re-read board state before dispatch
        id: dispatch_board
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ITEMS=$(gh api graphql -f query='{ node(id: "PVT_kwHOBA7RLM4BVBrQ") { ... on ProjectV2 { items(first: 100) { nodes { id content { ... on Issue { number title body labels(first: 10) { nodes { name } } } } fieldValues(first: 10) { nodes { ... on ProjectV2ItemFieldSingleSelectValue { field { ... on ProjectV2SingleSelectField { name } } name } } } } } } } }')
          echo "$ITEMS" > /tmp/board.json
          NEXT_COUNT=$(echo "$ITEMS" | jq '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Next"))] | length')
          DOING_COUNT=$(echo "$ITEMS" | jq '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Doing"))] | length')
          echo "next=$NEXT_COUNT" >> $GITHUB_OUTPUT
          echo "doing=$DOING_COUNT" >> $GITHUB_OUTPUT
      - name: Build
        if: steps.dispatch_board.outputs.next > 0 && steps.dispatch_board.outputs.doing < env.MAX_CONCURRENT_BUILDS
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          ITEM=$(cat /tmp/board.json | jq -c '[.data.node.items.nodes[] | select(.fieldValues.nodes[] | select(.name? == "Next"))] | .[0]')
          ITEM_ID=$(echo $ITEM | jq -r '.id'); ISSUE_NUM=$(echo $ITEM | jq -r '.content.number'); TITLE=$(echo $ITEM | jq -r '.content.title')
          [ "$ITEM_ID" = "null" ] && exit 0
          gh api graphql -f query='mutation { updateProjectV2ItemFieldValue(input: { projectId: "PVT_kwHOBA7RLM4BVBrQ" itemId: "'$ITEM_ID'" fieldId: "PVTSSF_lAHOBA7RLM4BVBrQzhQgUBE" value: { singleSelectOptionId: "4c8c3cbc" } }) { projectV2Item { id } } }'
          gh issue comment $ISSUE_NUM --repo mishanovini/claudecode-writer --body '## Build Started. _Automated_'
          echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_ENV; echo "ITEM_ID=$ITEM_ID" >> $GITHUB_ENV; echo "TITLE=$TITLE" >> $GITHUB_ENV
      - name: Claude Code
        if: env.ISSUE_NUM != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: 'Build Issue #${{ env.ISSUE_NUM }}: ${{ env.TITLE }}. Read Issue body. Diagnostic-first. Commit referencing Issue. Create PR.'
          max_turns: 50
          timeout_minutes: 30
      - name: Verify
        if: env.ISSUE_NUM != '' && success()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          gh api graphql -f query='mutation { updateProjectV2ItemFieldValue(input: { projectId: "PVT_kwHOBA7RLM4BVBrQ" itemId: "'$ITEM_ID'" fieldId: "PVTSSF_lAHOBA7RLM4BVBrQzhQgUBE" value: { singleSelectOptionId: "532c39be" } }) { projectV2Item { id } } }'
          gh issue comment $ISSUE_NUM --repo mishanovini/claudecode-writer --body '## Ready for Review. _Automated_'
      - name: Handle build failure
        if: env.ISSUE_NUM != '' && failure()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          FAIL_COUNT=$(gh api repos/mishanovini/claudecode-writer/issues/$ISSUE_NUM/comments --jq '[.[] | select(.body | startswith("## Build Failed"))] | length')
          if [ "$FAIL_COUNT" -ge 2 ]; then
            gh api graphql -f query='mutation { updateProjectV2ItemFieldValue(input: { projectId: "PVT_kwHOBA7RLM4BVBrQ" itemId: "'$ITEM_ID'" fieldId: "PVTSSF_lAHOBA7RLM4BVBrQzhQgUBE" value: { singleSelectOptionId: "0040b126" } }) { projectV2Item { id } } }'
            gh issue edit "$ISSUE_NUM" --repo mishanovini/claudecode-writer --remove-label "implementing" --add-label "build-blocked" 2>/dev/null || true
            gh issue comment "$ISSUE_NUM" --repo mishanovini/claudecode-writer --body "## Build Blocked
          Build has failed 3 times. Moving to Backlog for manual investigation.
          _Automated_"
          else
            ATTEMPT=$((FAIL_COUNT + 1))
            gh api graphql -f query='mutation { updateProjectV2ItemFieldValue(input: { projectId: "PVT_kwHOBA7RLM4BVBrQ" itemId: "'$ITEM_ID'" fieldId: "PVTSSF_lAHOBA7RLM4BVBrQzhQgUBE" value: { singleSelectOptionId: "435710d3" } }) { projectV2Item { id } } }'
            gh issue edit "$ISSUE_NUM" --repo mishanovini/claudecode-writer --remove-label "implementing" 2>/dev/null || true
            gh issue comment "$ISSUE_NUM" --repo mishanovini/claudecode-writer --body "## Build Failed (attempt $ATTEMPT/3)
          Moving back to Next for retry.
          _Automated_"
          fi
